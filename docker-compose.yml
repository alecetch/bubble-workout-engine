services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    env_file:
      - ./api/.env
    image: node:20
    working_dir: /app
    volumes:
      - ./api:/app
    command: bash -lc "npm install && npm start"
    environment:
      PORT: 3000
      PGHOST: db
      PGPORT: 5432
      PGUSER: app
      PGPASSWORD: app
      PGDATABASE: app
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  pgdata: