services:
  db:
    image: postgres:16
    env_file:
      - ./api/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: node:20
    env_file:
      - ./api/.env
    working_dir: /app
    volumes:
      - ./api:/app
      - ./assets:/app/assets
      - ./migrations:/app/migrations
      - api_node_modules:/app/node_modules
    command: >
      sh -lc "
      export PGUSER=\"$$POSTGRES_USER\";
      export PGPASSWORD=\"$$POSTGRES_PASSWORD\";
      export PGDATABASE=\"$$POSTGRES_DB\";
      if [ ! -f node_modules/.package-lock.snapshot ] || ! cmp -s package-lock.json node_modules/.package-lock.snapshot; then
        npm ci &&
        cp package-lock.json node_modules/.package-lock.snapshot;
      fi;
      npm start
      "
    environment:
      PORT: 3000
      PGHOST: db
      PGPORT: 5432
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  doc-admin:
    image: node:20
    env_file:
      - ./api/.env
    working_dir: /app
    volumes:
      - ./admin-docs:/app
      - ./docs:/docs
      - doc_admin_node_modules:/app/node_modules
    command: >
      sh -lc "
      export DOC_ADMIN_DB_URL=\"postgresql://$$POSTGRES_USER:$$POSTGRES_PASSWORD@db:5432/doc_admin\";
      if [ ! -f node_modules/.package-lock.snapshot ] || ! cmp -s package-lock.json node_modules/.package-lock.snapshot; then
        npm ci &&
        cp package-lock.json node_modules/.package-lock.snapshot;
      fi;
      node server.js
      "
    environment:
      DOC_ADMIN_PORT: 3001
      DOCS_ROOT: /docs
      PGHOST: db
      PGPORT: 5432
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  flyway:
    image: flyway/flyway:12
    profiles: ["tools"]
    env_file:
      - ./api/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/flyway/sql:ro
    command: ["migrate"]

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP

  minio:
    image: minio/minio
    env_file:
      - ./api/.env
    entrypoint: >
      /bin/sh -ec "
      : \"$${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}\";
      : \"$${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}\";
      exec minio server /data --console-address ':9001'
      "
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    env_file:
      - ./api/.env
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      : \"$${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}\";
      : \"$${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}\";
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
        echo 'waiting for minio...';
        sleep 1;
      done;
      mc mb --ignore-existing local/media-assets;
      mc anonymous set download local/media-assets;
      mc mb --ignore-existing local/physique-photos;
      # physique-photos is intentionally private - no anonymous set
      echo 'minio bucket init complete';
      "

  minio-seed:
    build:
      context: .
      dockerfile: docker/minio-seed/Dockerfile
    env_file:
      - ./api/.env
    depends_on:
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    entrypoint: >
      /bin/sh -ec "
      : \"$${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}\";
      : \"$${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}\";
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      MISSING='';
      for f in \
        /seed/media-assets/program_day/mixed_full_body.png \
        /seed/media-assets/program_day/recovery_recovery.png \
        /seed/media-assets/program_day/conditioning_conditioning.png \
        /seed/media-assets/program/mixed_full_body.png \
        /seed/media-assets/program_day/skills_lower_body.png \
        /seed/media-assets/program_day/hypertrophy_upper_body.png; do
        if [ ! -f \"$$f\" ]; then
          MISSING=\"$$MISSING\n$$f\";
        fi;
      done;
      if [ -n \"$$MISSING\" ]; then
        echo 'ERROR: Missing required media asset files:';
        printf '%b\n' \"$$MISSING\";
        exit 1;
      fi;
      find /seed/media-assets -type f -name '.gitkeep' -delete || true;
      mc cp --recursive /seed/media-assets/ local/media-assets/;
      mc ls --recursive local/media-assets;
      "
    restart: "no"

volumes:
  pgdata:
  minio_data:
  api_node_modules:
  doc_admin_node_modules:
