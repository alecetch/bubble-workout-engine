<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coverage Report</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --panel: #ffffff;
        --border: #d8dee6;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #0f62fe;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Segoe UI, Arial, sans-serif;
      }
      .page {
        padding: 14px;
      }
      .header {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
      }
      .top-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }
      .title {
        margin: 0;
        font-size: 22px;
      }
      .nav {
        display: flex;
        gap: 10px;
      }
      .nav a {
        color: #1d4ed8;
        text-decoration: none;
        font-size: 13px;
      }
      .nav a:hover {
        text-decoration: underline;
      }
      .controls {
        display: grid;
        grid-template-columns: 280px 200px 200px 160px auto;
        gap: 10px;
        align-items: center;
      }
      .control {
        display: grid;
        gap: 4px;
      }
      .control label {
        font-size: 12px;
        color: var(--muted);
      }
      input,
      select,
      button {
        font: inherit;
      }
      input,
      select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 9px;
        background: #fff;
      }
      td.constraints-cell {
        white-space: normal;
        min-width: 160px;
        max-width: 260px;
        word-break: break-word;
      }
      .constraint-line { display: block; line-height: 1.5; }
      .constraint-preset-code { font-weight: 600; color: var(--muted); margin-right: 3px; }
      button {
        width: auto;
        border: 1px solid var(--primary);
        border-radius: 6px;
        background: var(--primary);
        color: #fff;
        padding: 8px 12px;
        cursor: pointer;
      }
      .status {
        margin-top: 8px;
        font-size: 13px;
      }
      .status.ok {
        color: #0f766e;
      }
      .status.err {
        color: #b42318;
      }
      .summary {
        margin: 12px 0 8px 0;
        color: var(--muted);
        font-size: 13px;
      }
      .table-wrap {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 700px;
      }
      th,
      td {
        border: 1px solid #ecf0f4;
        padding: 6px 8px;
        text-align: left;
        vertical-align: top;
        font-size: 12px;
        white-space: nowrap;
      }
      th {
        background: #f9fbfd;
      }
      th.group {
        text-align: center;
        font-size: 11px;
      }
      td.count {
        text-align: center;
        font-variant-numeric: tabular-nums;
      }
      td.c0 {
        background: #fde8e8;
        color: #b42318;
        font-weight: 700;
      }
      td.c1 {
        background: #fef3c7;
        color: #92400e;
        font-weight: 700;
      }
      td.c2 {
        background: #d1fae5;
      }
      .constraints-empty {
        color: var(--muted);
        font-style: italic;
      }
      .focus-empty {
        color: var(--muted);
      }
      /* ── Score panel ─────────────────────────────────────────────────── */
      .score-panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 16px;
        margin: 12px 0 8px 0;
        display: none;
      }
      .score-panel.visible {
        display: block;
      }
      .score-top {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 14px;
      }
      .score-headline {
        display: flex;
        flex-direction: column;
        min-width: 110px;
      }
      .score-headline .score-label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .04em;
        margin-bottom: 2px;
      }
      .score-headline .score-value {
        font-size: 40px;
        font-weight: 700;
        line-height: 1;
      }
      .score-value.grade-a { color: #059669; }
      .score-value.grade-b { color: #0f766e; }
      .score-value.grade-c { color: #92400e; }
      .score-value.grade-d { color: #b42318; }
      .score-badges {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .badge {
        border-radius: 6px;
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
      }
      .badge-red   { background: #fde8e8; color: #b42318; }
      .badge-amber { background: #fef3c7; color: #92400e; }
      .badge-green { background: #d1fae5; color: #065f46; }
      .score-breakdowns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px 24px;
      }
      .breakdown-section h4 {
        margin: 0 0 6px 0;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: .04em;
        color: var(--muted);
      }
      .bar-row {
        display: grid;
        grid-template-columns: 160px 1fr 36px;
        align-items: center;
        gap: 8px;
        margin-bottom: 5px;
      }
      .bar-row .bar-label {
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .bar-track {
        height: 8px;
        background: #e5e7eb;
        border-radius: 4px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width .3s;
      }
      .bar-fill.grade-a { background: #059669; }
      .bar-fill.grade-b { background: #0f766e; }
      .bar-fill.grade-c { background: #d97706; }
      .bar-fill.grade-d { background: #ef4444; }
      .bar-pct {
        font-size: 11px;
        color: var(--muted);
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      td.count.cell-click { cursor: pointer; }
      td.count.cell-click:hover { filter: brightness(0.88); }
      .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 500; display: flex; align-items: center; justify-content: center; }
      .modal-overlay[hidden] { display: none; }
      .modal-panel { background: #fff; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,.2); width: min(520px, 95vw); max-height: 80vh; display: flex; flex-direction: column; }
      .modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 14px 16px 10px; border-bottom: 1px solid var(--border); }
      .modal-header h3 { margin: 0; font-size: 14px; line-height: 1.4; }
      .modal-close { border: none; background: none; cursor: pointer; font-size: 18px; color: var(--muted); padding: 0; line-height: 1; flex-shrink: 0; }
      .modal-body { overflow-y: auto; padding: 10px 16px 16px; }
      .match-list { list-style: none; margin: 0; padding: 0; }
      .match-item { display: flex; align-items: baseline; gap: 8px; padding: 5px 0; border-bottom: 1px solid #f0f2f4; font-size: 13px; }
      .match-item:last-child { border-bottom: none; }
      .match-score { min-width: 34px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; color: var(--primary); font-size: 12px; }
      .match-name { flex: 1; }
      .match-reasons { font-size: 11px; color: var(--muted); white-space: nowrap; }
      .match-empty { color: var(--muted); font-style: italic; font-size: 13px; padding: 8px 0; }
      .modal-loading { color: var(--muted); font-size: 13px; padding: 12px 0; }
      @media (max-width: 1100px) {
        .score-breakdowns { grid-template-columns: 1fr; }
        .controls { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="header">
        <div class="top-row">
          <h1 class="title">Coverage Report</h1>
          <div class="nav">
            <a href="/admin-ui/index.html">Config Editor</a>
            <a href="/admin/coverage">Coverage Report</a>
            <a href="/admin/observability">Observability</a>
          </div>
        </div>
        <div class="controls">
          <div class="control">
            <label for="token-input">Internal API Token</label>
            <input id="token-input" type="password" placeholder="Paste x-internal-token" />
          </div>
          <div class="control">
            <label for="config-filter">Config</label>
            <select id="config-filter"></select>
          </div>
          <div class="control">
            <label for="preset-filter">Preset</label>
            <select id="preset-filter"></select>
          </div>
          <div class="control">
            <label for="show-filter">Show</label>
            <select id="show-filter">
              <option value="all">All slots</option>
              <option value="gaps">Gaps only</option>
            </select>
          </div>
        </div>
        <div style="margin-top: 10px">
          <button id="load-btn" type="button">Load Report</button>
        </div>
        <div id="status" class="status"></div>
      </section>

      <div id="score-panel" class="score-panel">
        <div class="score-top">
          <div class="score-headline">
            <span class="score-label">Coverage score</span>
            <span id="score-value" class="score-value">—</span>
          </div>
          <div class="score-badges">
            <span id="badge-zero" class="badge badge-red">— zero gaps</span>
            <span id="badge-thin" class="badge badge-amber">— thin (1 option)</span>
            <span id="badge-ok"   class="badge badge-green">— covered (2+)</span>
          </div>
        </div>
        <div class="score-breakdowns">
          <div class="breakdown-section">
            <h4>By config</h4>
            <div id="breakdown-config"></div>
          </div>
          <div class="breakdown-section">
            <h4>By preset</h4>
            <div id="breakdown-preset"></div>
          </div>
        </div>
      </div>

      <div id="summary" class="summary"></div>

      <div class="table-wrap">
        <table id="report-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <div id="match-modal" class="modal-overlay" hidden>
      <div class="modal-panel">
        <div class="modal-header">
          <h3 id="modal-title"></h3>
          <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <script type="module">
      const STORAGE_KEY = "admin_internal_api_token";
      const RANKS_ORDER = [0, 1, 2, 3];
      const RANK_SHORT = { 0: "B", 1: "I", 2: "A", 3: "E" };
      const PRESET_SHORT = {
        no_equipment: "NE",
        minimal_equipment: "ME",
        decent_home_gym: "HG",
        commercial_gym: "CG",
        crossfit_hyrox_gym: "CF",
      };

      const state = {
        presets: [],
        rows: [],
        selectedConfig: "all",
        selectedShow: "all",
        selectedPreset: "all",
        visiblePresets: new Set(),
      };

      // ── Exercise cache & matching ─────────────────────────────────────────
      const EXCLUDED_MC = new Set(["cardio", "conditioning", "locomotion"]);
      let _exerciseCache = null;

      async function getExercises() {
        if (_exerciseCache) return _exerciseCache;
        const res = await fetch("/admin/exercise-catalogue/full-state", {
          headers: { "x-internal-token": getToken() },
        });
        if (!res.ok) throw new Error(`Exercise catalogue fetch failed: HTTP ${res.status}`);
        const data = await res.json();
        if (!Array.isArray(data.exercises)) throw new Error(data.error || "Invalid exercise catalogue response");
        _exerciseCache = data.exercises;
        return _exerciseCache;
      }

      function scoreExercise(ex, slot, presetEquipSet, rank) {
        if (ex.is_archived) return null;
        if ((ex.min_fitness_rank ?? 0) > rank) return null;
        if (EXCLUDED_MC.has(ex.movement_class)) return null;
        const eqSlugs = ex.equipment_items_slugs ?? [];
        if (!eqSlugs.every(s => presetEquipSet.has(s))) return null;

        const { sw, sw2, swAny = [], sw2Any = [], mp } = slot;
        const unconstrained = !sw && !sw2 && !swAny.length && !sw2Any.length && !mp;
        if (!unconstrained) {
          const matches =
            (sw && ex.swap_group_id_1 === sw) ||
            (sw2 && ex.swap_group_id_2 === sw2) ||
            (swAny.length && swAny.includes(ex.swap_group_id_1)) ||
            (sw2Any.length && sw2Any.includes(ex.swap_group_id_2)) ||
            (mp && ex.movement_pattern_primary === mp);
          if (!matches) return null;
        }

        let score = 0;
        const reasons = [];
        if (sw && ex.swap_group_id_1 === sw)               { score += 10; reasons.push(`sw+10`); }
        if (sw2 && ex.swap_group_id_2 === sw2)             { score += 12; reasons.push(`sw2+12`); }
        if (swAny.length && swAny.includes(ex.swap_group_id_1))   { score += 10; reasons.push(`swAny+10`); }
        if (sw2Any.length && sw2Any.includes(ex.swap_group_id_2)) { score += 12; reasons.push(`sw2Any+12`); }
        if (mp && ex.movement_pattern_primary === mp)       { score += 4;  reasons.push(`mp+4`); }
        const prefTags = Array.isArray(ex.preferred_in_json) ? ex.preferred_in_json : [];
        if (slot.requirePref) {
          const hasPref = prefTags.includes(slot.requirePref);
          if (slot.pref_mode !== "soft" && !hasPref) return null; // strict hard gate (matches SQL)
          if (hasPref) {
            const bonus = slot.pref_bonus ?? 4;
            score += bonus;
            reasons.push(`pref+${bonus}`);
          }
        }
        if (ex.strength_equivalent) { score += 3; reasons.push(`SE+3`); }
        if (rank > 0) {
          const exRank = ex.min_fitness_rank ?? 0;
          const rankBonus = Math.min(exRank, rank) * 0.5;
          if (rankBonus > 0) { score += rankBonus; reasons.push(`rank+${rankBonus}`); }
        }
        return { score, reasons };
      }

      // ── Modal ─────────────────────────────────────────────────────────────
      const modalEl    = document.getElementById("match-modal");
      const modalTitle = document.getElementById("modal-title");
      const modalBody  = document.getElementById("modal-body");
      document.getElementById("modal-close").addEventListener("click", () => modalEl.hidden = true);
      modalEl.addEventListener("click", e => { if (e.target === modalEl) modalEl.hidden = true; });

      async function showMatchModal(row, presetCode, rank) {
        const preset = state.presets.find(p => p.code === presetCode);
        const rankLabel = { 0: "Beginner", 1: "Intermediate", 2: "Advanced", 3: "Elite" }[rank] ?? `Rank ${rank}`;
        modalTitle.textContent = `${row.slot} · ${preset?.label ?? presetCode} · ${rankLabel}`;
        modalBody.innerHTML = `<div class="modal-loading">Loading exercises…</div>`;
        modalEl.hidden = false;

        let exercises;
        try { exercises = await getExercises(); }
        catch (e) { modalBody.innerHTML = `<div class="match-empty">Failed to load exercises: ${escapeHtml(e.message)}</div>`; return; }

        const slot = row.resolved_by_preset?.[presetCode] ?? row;
        const presetEquipSet = new Set(preset?.equipment_slugs ?? []);

        const scored = exercises
          .map(ex => { const r = scoreExercise(ex, slot, presetEquipSet, rank); return r ? { ex, ...r } : null; })
          .filter(Boolean)
          .sort((a, b) => b.score - a.score);

        if (!scored.length) {
          modalBody.innerHTML = `<div class="match-empty">No matching exercises for this cell.</div>`;
          return;
        }
        modalBody.innerHTML = `<ul class="match-list">${scored.map(({ ex, score, reasons }) =>
          `<li class="match-item">
            <span class="match-score">${score}</span>
            <span class="match-name">${escapeHtml(ex.name)}</span>
            <span class="match-reasons">${escapeHtml(reasons.join(" · "))}</span>
          </li>`
        ).join("")}</ul>`;
      }

      const tokenInput = document.getElementById("token-input");
      const loadBtn = document.getElementById("load-btn");
      const statusEl = document.getElementById("status");
      const configFilterEl = document.getElementById("config-filter");
      const showFilterEl = document.getElementById("show-filter");
      const presetFilterEl = document.getElementById("preset-filter");
      const summaryEl = document.getElementById("summary");
      const tableHeadEl = document.getElementById("table-head");
      const tableBodyEl = document.getElementById("table-body");

      function escapeHtml(v) {
        return String(v ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function getToken() {
        return tokenInput.value.trim();
      }

      function setStatus(msg, kind = "") {
        statusEl.textContent = msg;
        statusEl.className = `status ${kind}`.trim();
      }

      function describeResolvedConstraint(resolved) {
        const parts = [];
        if (!resolved || typeof resolved !== "object") return "";
        if (resolved.sw) parts.push(`sw:${resolved.sw}`);
        if (resolved.sw2) parts.push(`sw2:${resolved.sw2}`);
        if (Array.isArray(resolved.swAny) && resolved.swAny.length) parts.push(`swAny:[${resolved.swAny.join(",")}]`);
        if (Array.isArray(resolved.sw2Any) && resolved.sw2Any.length) parts.push(`sw2Any:[${resolved.sw2Any.join(",")}]`);
        if (resolved.mp) parts.push(`mp:${resolved.mp}`);
        if (resolved.requirePref) {
          const mode = resolved.pref_mode === "soft" ? "soft" : "strict";
          const bonus = mode === "soft" && Number.isFinite(Number(resolved.pref_bonus))
            ? `+${Number(resolved.pref_bonus)}`
            : "";
          parts.push(`pref:${resolved.requirePref} (${mode}${bonus ? ` ${bonus}` : ""})`);
        } else if (resolved.pref_mode === "soft") {
          parts.push("prefMode:soft");
        }
        if (resolved.strength_equivalent_bonus) parts.push("strengthEq:+3");
        return parts.length ? parts.join(" · ") : "";
      }

      function getConstraintText(row, visiblePresets) {
        const resolvedByPreset = row.resolved_by_preset || {};
        const byPreset = visiblePresets
          .map((preset) => {
            const resolved = resolvedByPreset[preset.code];
            const text = describeResolvedConstraint(resolved);
            if (!text) return "";
            const code = PRESET_SHORT[preset.code] || preset.code;
            return `<span class="constraint-line"><span class="constraint-preset-code">${code}:</span>${escapeHtml(text)}</span>`;
          })
          .filter(Boolean);
        if (byPreset.length > 0) return byPreset.join("");
        const fallback = describeResolvedConstraint(row);
        return fallback ? escapeHtml(fallback) : "";
      }

      // ── Coverage score ────────────────────────────────────────────────
      // Each (slot × preset × rank) cell scores: 0=0, 1=0.5, 2+=1.0
      // Overall score = sum / total * 100

      function cellScore(count) {
        if (count === 0) return 0;
        if (count === 1) return 0.5;
        return 1;
      }

      function gradeClass(pct) {
        if (pct >= 80) return "grade-a";
        if (pct >= 60) return "grade-b";
        if (pct >= 40) return "grade-c";
        return "grade-d";
      }

      function computeScoreForRows(rows, presetCodes) {
        let total = 0, points = 0, zeros = 0, thins = 0, covered = 0;
        for (const row of rows) {
          for (const code of presetCodes) {
            for (const rank of RANKS_ORDER) {
              const count = Number(row.counts?.[`${code}_${rank}`] ?? 0);
              points += cellScore(count);
              total += 1;
              if (count === 0) zeros++;
              else if (count === 1) thins++;
              else covered++;
            }
          }
        }
        const pct = total === 0 ? 0 : Math.round((points / total) * 100);
        return { pct, zeros, thins, covered, total };
      }

      function renderBar(label, pct) {
        const grade = gradeClass(pct);
        return `
          <div class="bar-row">
            <span class="bar-label" title="${escapeHtml(label)}">${escapeHtml(label)}</span>
            <div class="bar-track">
              <div class="bar-fill ${grade}" style="width:${pct}%"></div>
            </div>
            <span class="bar-pct">${pct}%</span>
          </div>`;
      }

      function renderScorePanel(rows, visiblePresets) {
        const visiblePresetCodes = visiblePresets.map((p) => p.code);
        const overall = computeScoreForRows(rows, visiblePresetCodes);

        const scorePanelEl = document.getElementById("score-panel");
        const scoreValueEl = document.getElementById("score-value");
        const badgeZeroEl  = document.getElementById("badge-zero");
        const badgeThinEl  = document.getElementById("badge-thin");
        const badgeOkEl    = document.getElementById("badge-ok");
        const breakdownCfgEl    = document.getElementById("breakdown-config");
        const breakdownPresetEl = document.getElementById("breakdown-preset");

        scorePanelEl.classList.add("visible");
        scoreValueEl.textContent = `${overall.pct}%`;
        scoreValueEl.className = `score-value ${gradeClass(overall.pct)}`;

        badgeZeroEl.textContent = `${overall.zeros} zero gaps`;
        badgeThinEl.textContent = `${overall.thins} thin (1 option)`;
        badgeOkEl.textContent   = `${overall.covered} covered (2+)`;

        // By config
        const configKeys = Array.from(new Set(rows.map((r) => r.config_key))).sort();
        breakdownCfgEl.innerHTML = configKeys
          .map((key) => {
            const cfgRows = rows.filter((r) => r.config_key === key);
            const { pct } = computeScoreForRows(cfgRows, visiblePresetCodes);
            const shortKey = key.replace(/_default_v\d+$/, "").replace(/_/g, " ");
            return renderBar(shortKey, pct);
          })
          .join("");

        // By preset
        breakdownPresetEl.innerHTML = visiblePresets
          .map((preset) => {
            const { pct } = computeScoreForRows(rows, [preset.code]);
            return renderBar(preset.label, pct);
          })
          .join("");
      }

      function hasGap(row, visiblePresetCodes) {
        for (const code of visiblePresetCodes) {
          for (const rank of RANKS_ORDER) {
            const key = `${code}_${rank}`;
            const count = Number(row.counts?.[key] ?? 0);
            if (count <= 1) return true;
          }
        }
        return false;
      }

      function filteredRows() {
        const presetCodes = state.presets
          .map((p) => p.code)
          .filter((code) => state.visiblePresets.has(code));
        return state.rows.filter((row) => {
          if (state.selectedConfig !== "all" && row.config_key !== state.selectedConfig) return false;
          if (state.selectedShow === "gaps" && !hasGap(row, presetCodes)) return false;
          return true;
        });
      }

      function renderFilters() {
        const configKeys = Array.from(new Set(state.rows.map((r) => r.config_key))).sort();
        configFilterEl.innerHTML = [
          `<option value="all"${state.selectedConfig === "all" ? " selected" : ""}>All configs</option>`,
          ...configKeys.map(
            (k) => `<option value="${escapeHtml(k)}"${state.selectedConfig === k ? " selected" : ""}>${escapeHtml(k)}</option>`,
          ),
        ].join("");

        const selectedPreset = state.selectedPreset || "all";
        presetFilterEl.innerHTML = [
          `<option value="all"${selectedPreset === "all" ? " selected" : ""}>All presets</option>`,
          ...state.presets.map(
            (p) => `<option value="${escapeHtml(p.code)}"${selectedPreset === p.code ? " selected" : ""}>${escapeHtml(p.label)}</option>`,
          ),
        ].join("");

        configFilterEl.addEventListener("change", () => {
          state.selectedConfig = configFilterEl.value || "all";
          renderTable();
        });

        presetFilterEl.addEventListener("change", () => {
          state.selectedPreset = presetFilterEl.value || "all";
          if (state.selectedPreset === "all") {
            for (const p of state.presets) state.visiblePresets.add(p.code);
          } else {
            state.visiblePresets.clear();
            state.visiblePresets.add(state.selectedPreset);
          }
          renderTable();
        });

        showFilterEl.addEventListener("change", () => {
          state.selectedShow = showFilterEl.value || "all";
          renderTable();
        });
      }

      function renderTable() {
        const scorePanelEl = document.getElementById("score-panel");
        const visiblePresets = state.presets.filter((p) => state.visiblePresets.has(p.code));
        const allRows = state.rows;
        const rows = filteredRows();
        if (rows.length > 0 && visiblePresets.length > 0) renderScorePanel(rows, visiblePresets);
        else scorePanelEl.classList.remove("visible");
        const gapsTotal = allRows.filter((row) =>
          hasGap(
            row,
            state.presets.map((p) => p.code),
          ),
        ).length;

        summaryEl.textContent = `Showing ${rows.length} of ${allRows.length} slots (${gapsTotal} with gaps).`;

        const fixedHeaders = `
          <tr>
            <th rowspan="2">Config</th>
            <th rowspan="2">Day</th>
            <th rowspan="2">Focus</th>
            <th rowspan="2">Slot</th>
            <th rowspan="2">Constraints</th>
            ${visiblePresets.map((p) => `<th class="group" colspan="4">${PRESET_SHORT[p.code] || p.code}</th>`).join("")}
          </tr>
          <tr>
            ${visiblePresets
              .map(() =>
                RANKS_ORDER.map((rank) => `<th>${RANK_SHORT[rank]}</th>`).join(""),
              )
              .join("")}
          </tr>
        `;
        tableHeadEl.innerHTML = fixedHeaders;

        tableBodyEl.innerHTML = rows
          .map((row) => {
            const ridx = state.rows.indexOf(row);
            const constraintText = getConstraintText(row, visiblePresets);
            const countCells = visiblePresets
              .map((preset) =>
                RANKS_ORDER.map((rank) => {
                  const key = `${preset.code}_${rank}`;
                  const count = Number(row.counts?.[key] ?? 0);
                  const cls = count === 0 ? "c0" : count === 1 ? "c1" : count === 2 ? "c2" : "";
                  return `<td class="count ${cls} cell-click" data-ridx="${ridx}" data-preset="${escapeHtml(preset.code)}" data-rank="${rank}" title="Click to see matching exercises">${count}</td>`;
                }).join(""),
              )
              .join("");
            return `
              <tr>
                <td>${escapeHtml(row.config_key)}</td>
                <td>${row.day_index} · ${escapeHtml(row.day_key)}</td>
                <td class="${row.day_focus ? "" : "focus-empty"}">${row.day_focus ? escapeHtml(row.day_focus) : "—"}</td>
                <td>${escapeHtml(row.slot)}</td>
                <td class="constraints-cell ${constraintText ? "" : "constraints-empty"}">${constraintText || "(unconstrained)"}</td>
                ${countCells}
              </tr>
            `;
          })
          .join("");
      }

      async function loadReport() {
        _exerciseCache = null; // Invalidate on each report load so modal reflects fresh DB state
        try {
          const token = getToken();
          if (!token) {
            setStatus("Missing token. Fill Internal API Token first.", "err");
            return;
          }
          sessionStorage.setItem(STORAGE_KEY, token);
          setStatus("Loading...", "");

          const res = await fetch("/api/admin/coverage-report", {
            headers: {
              "x-internal-token": token,
            },
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

          state.presets = Array.isArray(data.presets) ? data.presets : [];
          state.rows = Array.isArray(data.rows) ? data.rows : [];
          if (state.visiblePresets.size === 0) {
            for (const preset of state.presets) state.visiblePresets.add(preset.code);
          }

          renderFilters();
          renderTable();
          setStatus(`Loaded ${state.rows.length} slot rows.`, "ok");
        } catch (err) {
          setStatus(err.message || "Failed to load report", "err");
        }
      }

      function init() {
        const savedToken = sessionStorage.getItem(STORAGE_KEY);
        if (savedToken) tokenInput.value = savedToken;
        loadBtn.addEventListener("click", loadReport);

        tableBodyEl.addEventListener("click", e => {
          const td = e.target.closest("td.cell-click");
          if (!td) return;
          const row = state.rows[Number(td.dataset.ridx)];
          if (!row) return;
          showMatchModal(row, td.dataset.preset, Number(td.dataset.rank));
        });
      }

      init();
    </script>
  </body>
</html>
