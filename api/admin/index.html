
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Config Admin</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --panel: #ffffff;
        --border: #d8dee6;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #0f62fe;
        --success: #198754;
        --danger: #dc3545;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Segoe UI, Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      .page {
        display: grid;
        grid-template-columns: 320px 1fr;
        height: 100vh;
        transition: grid-template-columns 0.18s ease;
      }
      .page.sidebar-collapsed {
        grid-template-columns: 0 1fr;
      }
      .sidebar,
      .editor {
        overflow: auto;
      }
      .sidebar {
        border-right: 1px solid var(--border);
        background: var(--panel);
        display: flex;
        flex-direction: column;
        min-width: 0;
        transition: opacity 0.18s ease, border-color 0.18s ease;
      }
      .page.sidebar-collapsed .sidebar {
        opacity: 0;
        pointer-events: none;
        border-right-color: transparent;
      }
      .sidebar-header {
        padding: 14px;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .sidebar-title {
        margin: 0 0 8px 0;
        font-size: 20px;
      }
      .sidebar-toggle-btn {
        font-size: 12px;
        padding: 5px 8px;
        white-space: nowrap;
      }
      .token-row {
        display: grid;
        gap: 6px;
      }
      .nav-row {
        margin-top: 10px;
        display: flex;
        gap: 10px;
      }
      .nav-row a {
        font-size: 13px;
        color: #1d4ed8;
        text-decoration: none;
      }
      .nav-row a:hover {
        text-decoration: underline;
      }
      .token-row input {
        width: 100%;
      }
      .list-wrap {
        flex: 1;
        overflow: auto;
      }
      .config-item {
        padding: 10px 12px;
        border-bottom: 1px solid #eef2f6;
        cursor: pointer;
      }
      .config-item.active {
        background: #edf4ff;
      }
      .config-key {
        font-weight: 600;
      }
      .config-meta {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }
      .dot-on {
        color: var(--success);
      }
      .dot-off {
        color: #98a2b3;
      }
      .sidebar-footer {
        border-top: 1px solid var(--border);
        padding: 12px;
      }
      .editor {
        padding: 16px 18px 96px 18px;
      }
      .editor-toolbar {
        display: flex;
        justify-content: flex-start;
        margin-bottom: 10px;
      }
      .editor-toolbar:empty {
        display: none;
      }
      .editor-empty {
        color: var(--muted);
        margin-top: 20px;
      }
      .header-card,
      details {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .header-card {
        padding: 12px;
        margin-bottom: 12px;
      }
      .header-grid {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 12px;
        align-items: center;
      }
      details {
        margin-bottom: 12px;
      }
      summary {
        font-weight: 600;
        padding: 12px;
        cursor: pointer;
      }
      .section-body {
        padding: 12px;
        border-top: 1px solid #eff2f6;
      }
      label {
        font-size: 12px;
        color: var(--muted);
      }
      input,
      select,
      textarea,
      button {
        font: inherit;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #fff;
      }
      textarea {
        min-height: 300px;
        resize: vertical;
        font-family: Consolas, monospace;
        font-size: 12px;
      }
      .table-wrap {
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid #ebeff5;
        padding: 6px;
        vertical-align: middle;
        text-align: left;
      }
      th {
        background: #f9fbfd;
      }
      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }
      .tab-btn {
        width: auto;
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
      }
      .tab-btn.selected {
        background: #eef4ff;
        border-color: #b9d2ff;
        color: #1d4ed8;
      }
      .inline-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 10px;
      }
      .btn-row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
      }
      button {
        width: auto;
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 6px;
        padding: 7px 10px;
        cursor: pointer;
      }
      button.primary {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
      }
      button.saved {
        background: var(--success);
        border-color: var(--success);
        color: #fff;
      }
      button:disabled {
        background: #e5e7eb;
        border-color: #d1d5db;
        color: #9ca3af;
        cursor: default;
      }
      button.danger {
        border-color: #f0b7bf;
        color: #b42318;
      }
      .sticky-actions {
        position: fixed;
        left: 320px;
        right: 0;
        bottom: 0;
        z-index: 400;
        background: #fff;
        border-top: 1px solid var(--border);
        padding: 10px 18px;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: left 0.18s ease;
      }
      .page.sidebar-collapsed .sticky-actions {
        left: 0;
      }
      .status {
        font-size: 13px;
      }
      .status.ok {
        color: var(--success);
      }
      .status.err {
        color: var(--danger);
      }
      .chip-list {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        margin-top: 3px;
      }
      .chip {
        display: inline-block;
        background: #e0eaff;
        color: #1d4ed8;
        border-radius: 4px;
        padding: 1px 5px;
        font-size: 11px;
        white-space: nowrap;
      }
      .variant-badge {
        display: inline-block;
        background: #fef3c7;
        color: #92400e;
        border: 1px solid #fde68a;
        border-radius: 4px;
        padding: 2px 6px;
        font-size: 11px;
        font-weight: 600;
        white-space: nowrap;
      }
      .mp-combo-wrap { position: relative; }
      .mp-combo-dd { position: absolute; top: calc(100% + 2px); left: 0; min-width: 200px; background: #fff; border: 1px solid var(--border); border-radius: 6px; box-shadow: 0 4px 12px rgba(0,0,0,.12); max-height: 200px; overflow-y: auto; z-index: 300; list-style: none; margin: 0; padding: 2px 0; }
      .mp-combo-dd li { padding: 6px 10px; cursor: pointer; font-size: 12px; white-space: nowrap; }
      .mp-combo-dd li:hover, .mp-combo-dd li.mp-active { background: #ede9fe; color: #5b21b6; }
      .mp-combo-dd li.mp-new { color: #d97706; }
      .mp-new-warn { display: block; font-size: 11px; color: #d97706; margin-top: 2px; }
      .sw-combo-wrap { position: relative; }
      .sw-combo-dd { position: absolute; top: calc(100% + 2px); left: 0; min-width: 200px; background: #fff; border: 1px solid var(--border); border-radius: 6px; box-shadow: 0 4px 12px rgba(0,0,0,.12); max-height: 200px; overflow-y: auto; z-index: 300; list-style: none; margin: 0; padding: 2px 0; }
      .sw-combo-dd li { padding: 6px 10px; cursor: pointer; font-size: 12px; white-space: nowrap; }
      .sw-combo-dd li:hover, .sw-combo-dd li.sw-active { background: #e0eaff; color: #1d4ed8; }
      .sw-any-wrap { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; align-items: center; position: relative; }
      .sw-chip { display: inline-flex; align-items: center; gap: 2px; background: #e0eaff; color: #1d4ed8; border-radius: 4px; padding: 1px 4px; font-size: 11px; white-space: nowrap; }
      .sw-chip .chip-del { background: none; border: none; color: #1d4ed8; cursor: pointer; padding: 0; font-size: 12px; line-height: 1; opacity: 0.6; }
      .sw-chip .chip-del:hover { opacity: 1; }
      .sw-any-add-btn { background: none; border: 1px dashed #9ca3af; border-radius: 4px; color: #6b7280; cursor: pointer; font-size: 12px; padding: 1px 6px; line-height: 1.4; }
      .sw-any-add-btn:hover { border-color: #1d4ed8; color: #1d4ed8; }
      .sw-any-dd { position: absolute; top: calc(100% + 2px); left: 0; min-width: 180px; background: #fff; border: 1px solid var(--border); border-radius: 6px; box-shadow: 0 4px 12px rgba(0,0,0,.12); max-height: 200px; overflow-y: auto; z-index: 301; list-style: none; margin: 0; padding: 2px 0; }
      .sw-any-dd li { padding: 6px 10px; cursor: pointer; font-size: 12px; white-space: nowrap; }
      .sw-any-dd li:hover { background: #e0eaff; color: #1d4ed8; }
      .variant-toggle-btn { background: #fef3c7; border: 1px solid #fde68a; color: #92400e; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; width: auto; }
      .variant-toggle-btn:hover { background: #fde68a; }
      .variant-expand-row > td { background: #fffbeb; padding: 8px 10px; border-top: none; }
      .variant-section { border: 1px solid #fde68a; border-radius: 6px; padding: 8px; background: #fffdf5; }
      .variant-table { margin-bottom: 6px; font-size: 12px; }
      .variant-table th { background: #fef9e7; font-size: 11px; padding: 4px 6px; }
      .variant-table td { vertical-align: top; padding: 4px 6px; }
      .add-variant-btn { font-size: 12px; padding: 4px 8px; }
      .simulation-toggle-btn { background: #e0f2fe; border: 1px solid #bae6fd; color: #075985; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; width: auto; }
      .simulation-toggle-btn:hover { background: #bae6fd; }
      .simulation-expand-row > td { background: #f0f9ff; padding: 8px 10px; border-top: none; }
      .simulation-section { border: 1px solid #bae6fd; border-radius: 6px; padding: 10px; background: #f8fdff; }
      .simulation-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 10px; }
      .simulation-table { margin-bottom: 6px; font-size: 12px; }
      .simulation-table th { background: #eff6ff; font-size: 11px; padding: 4px 6px; }
      .simulation-table td { vertical-align: top; padding: 4px 6px; }
      .add-fallback-btn { font-size: 12px; padding: 4px 8px; }
      .field-hint { display: block; margin-top: 4px; font-size: 11px; color: #64748b; }
      @media (max-width: 980px) {
        .page {
          grid-template-columns: 1fr;
          grid-template-rows: 40vh 1fr;
          height: auto;
          min-height: 100vh;
        }
        .sticky-actions {
          left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-header-row">
            <h1 class="sidebar-title">Config Admin</h1>
            <button id="sidebar-toggle-btn" class="sidebar-toggle-btn" type="button">Hide</button>
          </div>
          <div class="token-row">
            <label for="token-input">Internal API Token</label>
            <input id="token-input" type="password" placeholder="Paste x-internal-token" />
            <button id="load-btn">Load Configs</button>
          </div>
          <div class="nav-row">
            <a href="/admin-ui/index.html">Config Editor</a>
            <a href="/admin/coverage">Coverage</a>
            <a href="/admin/health">Health</a>
            <a href="/admin/exercises">Exercises</a>
            <a href="/admin/narration">Narration</a>
            <a href="/admin/rep-rules">Rep Rules</a>
            <a href="/admin/observability">Observability</a>
            <a href="/admin/preview">Preview</a>
          </div>
        </div>
        <div id="config-list" class="list-wrap"></div>
        <div class="sidebar-footer">
          <button id="duplicate-btn">+ New (duplicate)</button>
        </div>
      </aside>

      <main class="editor">
        <div class="editor-toolbar">
          <button id="sidebar-show-btn" class="sidebar-toggle-btn" type="button" hidden>Show Configs</button>
        </div>
        <div id="editor-root"></div>
      </main>
    </div>

	    <script type="module">
	      const STORAGE_KEY = "admin_internal_api_token";
	      const SIDEBAR_COLLAPSED_KEY = "admin_config_sidebar_collapsed";
	      const ADMIN_IDLE_TIMEOUT_MS = 30 * 60 * 1000;
      const LAST_ACTIVE_KEY = `${STORAGE_KEY}:last_active`;
      const ACTIVITY_EVENTS = ["pointerdown", "keydown", "mousedown", "touchstart", "scroll"];
      const DURATIONS = ["40", "50", "60"];
      const CORE_BLOCKS = ["A", "B", "C", "D"];
      const REQUIRE_PREF_OPTIONS = [
        "",
        "strength_main",
        "hypertrophy_secondary",
        "conditioning_main",
        "finisher",
        "hyrox_buy_in",
        "hyrox_station",
        "hyrox_power",
        "ski_erg",
        "row_erg",
        "bike_erg",
      ];
	      const PREF_MODE_OPTIONS = ["", "strict", "soft"];
	      const VARIABILITY_POLICY_OPTIONS = ["", "high", "med", "none"];
	      const DAY_SELECTION_MODE_OPTIONS = ["default", "benchmark_exactness"];
      const SEGMENT_TYPES = ["single", "superset", "giant_set", "amrap", "emom"];
      const PURPOSE_TYPES = ["main", "secondary", "accessory"];
      const RANKS = ["beginner", "intermediate", "advanced", "elite"];

      const state = {
        configs: [],
        selectedKey: null,
        configRow: null,
        jsonObj: {},
        rawText: "",
        dayTab: 0,
        rawEdited: false,
        isDirty: false,
        status: "",
        statusKind: "",
        expandedVariantSlots: new Set(),
        expandedSimulationSlots: new Set(),
      };

      const tokenInput = document.getElementById("token-input");
	      const loadBtn = document.getElementById("load-btn");
	      const duplicateBtn = document.getElementById("duplicate-btn");
	      const configListEl = document.getElementById("config-list");
	      const editorRoot = document.getElementById("editor-root");
	      const pageEl = document.querySelector(".page");
	      const sidebarToggleBtn = document.getElementById("sidebar-toggle-btn");
	      const sidebarShowBtn = document.getElementById("sidebar-show-btn");

	      function deepClone(x) {
	        return JSON.parse(JSON.stringify(x ?? {}));
	      }
	      function isSidebarCollapsed() {
	        return sessionStorage.getItem(SIDEBAR_COLLAPSED_KEY) === "1";
	      }
	      function applySidebarState(collapsed) {
	        pageEl.classList.toggle("sidebar-collapsed", !!collapsed);
	        if (sidebarToggleBtn) sidebarToggleBtn.textContent = collapsed ? "Show" : "Hide";
	        if (sidebarShowBtn) sidebarShowBtn.hidden = !collapsed;
	      }
	      function setSidebarCollapsed(collapsed) {
	        sessionStorage.setItem(SIDEBAR_COLLAPSED_KEY, collapsed ? "1" : "0");
	        applySidebarState(collapsed);
	      }
	      function getToken() {
	        return tokenInput.value.trim();
	      }
      function saveToken(token) {
        const value = String(token || "").trim();
        if (!value) {
          clearStoredToken();
          return "";
        }
        sessionStorage.setItem(STORAGE_KEY, value);
        sessionStorage.setItem(LAST_ACTIVE_KEY, String(Date.now()));
        return value;
      }
	      function clearStoredToken() {
	        sessionStorage.removeItem(STORAGE_KEY);
	        sessionStorage.removeItem(LAST_ACTIVE_KEY);
	      }
	      applySidebarState(isSidebarCollapsed());
	      sidebarToggleBtn?.addEventListener("click", () => {
	        setSidebarCollapsed(!isSidebarCollapsed());
	      });
	      sidebarShowBtn?.addEventListener("click", () => {
	        setSidebarCollapsed(false);
	      });
	      function clearAdminSession(expired = false) {
        clearStoredToken();
        tokenInput.value = "";
        if (expired) {
          window.alert("Admin session expired after 30 minutes of inactivity. Please enter the token again.");
        }
      }
      function hasExpiredSession() {
        const token = sessionStorage.getItem(STORAGE_KEY);
        if (!token) return false;
        const lastActive = Number(sessionStorage.getItem(LAST_ACTIVE_KEY) || 0);
        return !lastActive || Date.now() - lastActive > ADMIN_IDLE_TIMEOUT_MS;
      }
      function ensureActiveAdminSession({ reloadOnExpire = false } = {}) {
        if (!hasExpiredSession()) return true;
        clearAdminSession(true);
        if (reloadOnExpire) window.location.reload();
        return false;
      }
      function touchAdminSession() {
        if (sessionStorage.getItem(STORAGE_KEY)) {
          sessionStorage.setItem(LAST_ACTIVE_KEY, String(Date.now()));
        }
      }
      function installAdminIdleTimeout() {
        const onActivity = () => touchAdminSession();
        for (const eventName of ACTIVITY_EVENTS) {
          window.addEventListener(eventName, onActivity, { passive: true });
        }
        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState !== "visible") return;
          if (!ensureActiveAdminSession({ reloadOnExpire: true })) return;
          touchAdminSession();
        });
        window.setInterval(() => {
          ensureActiveAdminSession({ reloadOnExpire: true });
        }, 60 * 1000);
      }
      function escapeHtml(v) {
        return String(v ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }
      function toInt(value, fallback = 0) {
        const n = Number(value);
        return Number.isFinite(n) ? Math.round(n) : fallback;
      }
      function parseCsvList(value) {
        return String(value || "")
          .split(",")
          .map((part) => part.trim())
          .filter(Boolean);
      }
      function formatCsvList(values) {
        return Array.isArray(values) ? values.filter(Boolean).join(", ") : "";
      }
      function isValidSlotKey(value) {
        return /^[A-Z]:.+/.test(String(value || "").trim());
      }
      function getEditorBlockLetters(root) {
        const semantics = root?.segmentation?.block_semantics;
        const semanticKeys =
          semantics && typeof semantics === "object" && !Array.isArray(semantics)
            ? Object.keys(semantics)
            : [];
        const slotKeys = Array.isArray(root?.builder?.day_templates)
          ? root.builder.day_templates.flatMap((day) =>
              (Array.isArray(day?.ordered_slots) ? day.ordered_slots : [])
                .map((slot) => String(slot?.slot || "").trim().split(":")[0])
                .filter((block) => /^[A-Z]$/.test(block)),
            )
          : [];
        return Array.from(new Set([...CORE_BLOCKS, ...semanticKeys, ...slotKeys]))
          .filter((block) => /^[A-Z]$/.test(String(block || "").trim()))
          .sort();
      }
      function validateStructuredEditor() {
        const slotInputs = Array.from(document.querySelectorAll('[data-slot-field="slot"]'));
        for (const input of slotInputs) {
          const value = String(input.value || "").trim();
          if (!value) {
            input.setCustomValidity("");
            continue;
          }
          if (!isValidSlotKey(value)) {
            input.setCustomValidity('Slot must look like "A:name" with a block letter, colon, and name.');
            input.reportValidity();
            input.focus();
            setStatus(`Invalid slot key: ${value}`, "err");
            return false;
          }
          input.setCustomValidity("");
        }
        return true;
      }

      function setStatus(message, kind = "") {
        state.status = message;
        state.statusKind = kind;
        renderStickyStatus();
      }

      async function apiFetch(path, init = {}) {
        if (!ensureActiveAdminSession({ reloadOnExpire: true })) {
          throw new Error("Admin session expired. Reload and enter the token again.");
        }
        const token = saveToken(getToken());
        if (!token) throw new Error("Missing token. Fill Internal API Token first.");

        const headers = {
          "Content-Type": "application/json",
          "x-internal-token": token,
          ...(init.headers || {}),
        };

        const res = await fetch(path, { ...init, headers });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        return data;
      }

      function ensureBuilderAndSegmentation() {
        const root = state.jsonObj;
        if (!root.builder || typeof root.builder !== "object" || Array.isArray(root.builder)) {
          root.builder = {};
        }
        if (
          !root.builder.sets_by_duration ||
          typeof root.builder.sets_by_duration !== "object" ||
          Array.isArray(root.builder.sets_by_duration)
        ) {
          root.builder.sets_by_duration = {};
        }
        if (
          !root.builder.block_budget ||
          typeof root.builder.block_budget !== "object" ||
          Array.isArray(root.builder.block_budget)
        ) {
          root.builder.block_budget = {};
        }
        if (
          !root.builder.block_variability_defaults ||
          typeof root.builder.block_variability_defaults !== "object" ||
          Array.isArray(root.builder.block_variability_defaults)
        ) {
          root.builder.block_variability_defaults = {};
        }
        if (!Array.isArray(root.builder.day_templates)) root.builder.day_templates = [];
        if (
          !root.segmentation ||
          typeof root.segmentation !== "object" ||
          Array.isArray(root.segmentation)
        ) {
          root.segmentation = {};
        }
        if (
          !root.segmentation.block_semantics ||
          typeof root.segmentation.block_semantics !== "object" ||
          Array.isArray(root.segmentation.block_semantics)
        ) {
          root.segmentation.block_semantics = {};
        }
        if (
          !root.progression ||
          typeof root.progression !== "object" ||
          Array.isArray(root.progression)
        ) {
          root.progression = {};
        }
        if (!Array.isArray(root.progression.apply_to_purposes)) {
          root.progression.apply_to_purposes = [];
        }
      }

      function syncRaw() {
        state.rawText = JSON.stringify(state.jsonObj, null, 2);
        const rawEl = document.getElementById("raw-json");
        if (rawEl) rawEl.value = state.rawText;
      }

      function renderConfigList() {
        if (!state.configs.length) {
          configListEl.innerHTML =
            '<div class="config-item"><span class="config-meta">No configs loaded yet.</span></div>';
          return;
        }

        configListEl.innerHTML = state.configs
          .map((cfg) => {
            const selected = cfg.config_key === state.selectedKey ? "active" : "";
            const dot = cfg.is_active
              ? '<span class="dot-on">&#9679;</span>'
              : '<span class="dot-off">&#9675;</span>';
            return `
              <div class="config-item ${selected}" data-key="${escapeHtml(cfg.config_key)}">

      function renderStickyStatus() {
        const statusEl = document.getElementById("save-status");

        statusEl.className = `status ${state.statusKind || ""}`;
      }

      function getRankConfig() {
        const ranks = state.configRow?.progression_by_rank_json;
        if (ranks && typeof ranks === "object" && !Array.isArray(ranks)) return deepClone(ranks);
        return {};
      }
      function renderEditor() {
        if (!state.configRow) {

        ensureBuilderAndSegmentation();
        const root = state.jsonObj;
        const dayTemplates = root.builder.day_templates;

        const semanticsRows = semKeys
          .map((letter) => {
            const sem = semantics[letter] || {};
            const segmentOptions = SEGMENT_TYPES.map((t) => {
              const selected = sem.preferred_segment_type === t ? "selected" : "";
              return `<option value="${t}" ${selected}>${t}</option>`;
            }).join("");
            const purposeOptions = PURPOSE_TYPES.map((p) => {
              const selected = sem.purpose === p ? "selected" : "";
              return `<option value="${p}" ${selected}>${p}</option>`;
            }).join("");
            return `
              <tr data-sem-letter="${escapeHtml(letter)}">
                <td><input data-sem-field="letter" value="${escapeHtml(letter)}" ${CORE_BLOCKS.includes(letter) ? "readonly" : ""} /></td>
                <td><select data-sem-field="preferred_segment_type">${segmentOptions}</select></td>
                <td><select data-sem-field="purpose">${purposeOptions}</select></td>

        const progressionRows = RANKS.map((rank) => {

                <table>
                  <thead>

                  </thead>
                  <tbody>
                    ${setsRows
                      .map(
                        (row) => `
                        <tr>
                          <td>${row.label}</td>
                          ${DURATIONS.map(
                            (d) =>
                              `<td><input type="number" min="0" max="20" data-sets-block="${row.block}" data-sets-duration="${d}" value="${escapeHtml(root.builder.sets_by_duration?.[d]?.[row.block] ?? 0)}" /></td>`,
                          ).join("")}
                        </tr>
                      `,
                      )
                      .join("")}
                    <tr>
                      <td>Block budget</td>
                      ${DURATIONS.map(
                        (d) =>
                          `<td><input type="number" min="0" max="20" data-budget-duration="${d}" value="${escapeHtml(root.builder.block_budget?.[d] ?? 0)}" /></td>`,
                      ).join("")}
                    </tr>
                  </tbody>

              </div>
              <div class="table-wrap" style="margin-top:12px;max-width:420px;">
                <table>
                  <thead>
                    <tr><th>Block</th><th>Variability default</th></tr>
                  </thead>
                  <tbody>${variabilityDefaultRows}</tbody>
                </table>
              </div>
            </div>
          </details>

          <details open>
            <summary>Builder: day templates</summary>
            <div class="section-body">
              <div class="tabs">
                ${dayTabsHtml}
                <button id="add-day-btn" type="button">+ Add day</button>
              </div>
              ${
                selectedDay
                  ? `
                    <div class="inline-grid">
                      <div>
                        <label>Day key</label>
                        <input id="day-key-input" value="${escapeHtml(selectedDay.day_key || "")}" />
                      </div>
                      <div>
                        <label>Focus</label>
                        <input id="day-focus-input" value="${escapeHtml(selectedDay.focus || "")}" />
                      </div>
                      <div>
                        <label>Day selection mode</label>
                        <select id="day-selection-mode-input">
                          ${DAY_SELECTION_MODE_OPTIONS.map((mode) => {

                      <datalist id="slot-family-options">${familyOptionsHtml}</datalist>
                      <table>

                          </tr>

                    </div>
                    <div class="btn-row">
                      <button id="add-slot-btn" type="button">+ Add slot</button>

      function updateFromStructuredInputs() {
        ensureBuilderAndSegmentation();
        const root = state.jsonObj;

        DURATIONS.forEach((d) => {
          if (!root.builder.sets_by_duration[d] || typeof root.builder.sets_by_duration[d] !== "object") {
            root.builder.sets_by_duration[d] = {};
          }
          getEditorBlockLetters(root).forEach((b) => {
            const input = document.querySelector(`[data-sets-block="${b}"][data-sets-duration="${d}"]`);
            root.builder.sets_by_duration[d][b] = toInt(input?.value, 0);
          });
          const budgetInput = document.querySelector(`[data-budget-duration="${d}"]`);
          root.builder.block_budget[d] = toInt(budgetInput?.value, 0);
        });
        const nextBlockVariabilityDefaults = {};
        getEditorBlockLetters(root).forEach((block) => {
          const input = document.querySelector(`[data-block-variability="${block}"]`);
          const value = (input?.value || "").trim();
          if (value) nextBlockVariabilityDefaults[block] = value;
        });
        root.builder.block_variability_defaults = nextBlockVariabilityDefaults;

        const templates = root.builder.day_templates;
        if (templates[state.dayTab]) {
          const template = templates[state.dayTab];
          template.day_key = (document.getElementById("day-key-input")?.value || "").trim();
          template.focus = (document.getElementById("day-focus-input")?.value || "").trim();
          template.day_selection_mode = document.getElementById("day-selection-mode-input")?.value || "default";
          if (template.day_selection_mode === "default") delete template.day_selection_mode;
          template.is_ordered_simulation = !!document.getElementById("day-ordered-simulation-input")?.checked;
          if (!template.is_ordered_simulation) delete template.is_ordered_simulation;
          const dayTypeVal = (document.getElementById("day-type-input")?.value || "").trim();
          if (dayTypeVal) template.day_type = dayTypeVal; else delete template.day_type;
          const slotRows = Array.from(document.querySelectorAll("#slots-tbody tr[data-slot-index]"));
          const existingSlots = template.ordered_slots || [];
          template.ordered_slots = slotRows.map((row) => {
            const slotIdx = Number(row.dataset.slotIndex);
            const existing = existingSlots[slotIdx] || {};
            const slot = (row.querySelector('[data-slot-field="slot"]')?.value || "").trim();
            const slotFamily = (row.querySelector('[data-slot-field="slot_family"]')?.value || "").trim();
            const variabilityPolicy = row.querySelector('[data-slot-field="variability_policy"]')?.value || "";
            const sw2 = (row.querySelector('[data-slot-field="sw2"]')?.value || "").trim();
            const sw = (row.querySelector('[data-slot-field="sw"]')?.value || "").trim();
            const mp = (row.querySelector('[data-slot-field="mp"]')?.value || "").trim();
            const requirePref = row.querySelector('[data-slot-field="requirePref"]')?.value || "";
            const prefMode = row.querySelector('[data-slot-field="pref_mode"]')?.value || "";
            const preferLoadable = !!row.querySelector('[data-slot-field="preferLoadable"]')?.checked;
            const fillFallback = (row.querySelector('[data-slot-field="fill_fallback_slot"]')?.value || "").trim();
            const simulationRow = document.querySelector(`[data-simulation-for="${slotIdx}"]`);
            const requireHyroxRole = (simulationRow?.querySelector('[data-sim-field="requireHyroxRole"]')?.value || "").trim();
            const stationIndexRaw = (simulationRow?.querySelector('[data-sim-field="station_index"]')?.value || "").trim();
            const requiredEquipmentSlugs = parseCsvList(
              simulationRow?.querySelector('[data-sim-field="required_equipment_slugs"]')?.value || "",
            );
            // Read swAny/sw2Any from DOM chip elements
            const swAnyVals = [...row.querySelectorAll('[data-any-for="swAny"] [data-chip-val]')].map(el => el.dataset.chipVal).filter(Boolean);
            const sw2AnyVals = [...row.querySelectorAll('[data-any-for="sw2Any"] [data-chip-val]')].map(el => el.dataset.chipVal).filter(Boolean);
            // Read variants from DOM (variant rows are always present in HTML, just hidden/shown)
            const variantDomRows = Array.from(document.querySelectorAll(`[data-variant-tbody="${slotIdx}"] tr[data-variant-index]`));
            const domVariants = variantDomRows.map(vr => {
              const equipProf = vr.querySelector('[data-variant-field="equipment_profile"]')?.value || "";
              const vSw2 = (vr.querySelector('[data-variant-field="sw2"]')?.value || "").trim();
              const vSw = (vr.querySelector('[data-variant-field="sw"]')?.value || "").trim();
              const vMp = (vr.querySelector('[data-variant-field="mp"]')?.value || "").trim();
              const vReqPref = vr.querySelector('[data-variant-field="requirePref"]')?.value || "";
              const vPrefMode = vr.querySelector('[data-variant-field="pref_mode"]')?.value || "";
              const vPrefBonusRaw = vr.querySelector('[data-variant-field="pref_bonus"]')?.value;
              const vSeBonus = !!vr.querySelector('[data-variant-field="strength_equivalent_bonus"]')?.checked;
              const vSwAny = [...vr.querySelectorAll('[data-variant-any-for="swAny"] [data-chip-val]')].map(el => el.dataset.chipVal).filter(Boolean);
              const vSw2Any = [...vr.querySelectorAll('[data-variant-any-for="sw2Any"] [data-chip-val]')].map(el => el.dataset.chipVal).filter(Boolean);
              const variant = {};
              if (equipProf) variant.when = { equipment_profile: equipProf };
              if (vSw2) variant.sw2 = vSw2;

              if (vPrefMode) variant.pref_mode = vPrefMode;
              const vPrefBonus = vPrefBonusRaw !== "" && vPrefBonusRaw != null ? Number(vPrefBonusRaw) : NaN;
              if (Number.isFinite(vPrefBonus)) variant.pref_bonus = vPrefBonus;
              if (vSeBonus) variant.strength_equivalent_bonus = true;
              return variant;
            });
            const fallbackDomRows = Array.from(document.querySelectorAll(`[data-fallback-tbody="${slotIdx}"] tr[data-fallback-index]`));
            const existingFallbacks = Array.isArray(existing.station_fallback_chain) ? existing.station_fallback_chain : [];

              const fallbackSwAnyVals = [...fr.querySelectorAll('[data-fallback-any-for="swAny"] [data-chip-val]')].map((el) => el.dataset.chipVal).filter(Boolean);
              const fallbackSw2AnyVals = [...fr.querySelectorAll('[data-fallback-any-for="sw2Any"] [data-chip-val]')].map((el) => el.dataset.chipVal).filter(Boolean);
              const fallback = {
                ...(existingFallback.pref_bonus != null ? { pref_bonus: existingFallback.pref_bonus } : {}),
                ...(existingFallback.strength_equivalent_bonus != null ? { strength_equivalent_bonus: existingFallback.strength_equivalent_bonus } : {}),

            });
            // Start with the existing slot to preserve fields not shown in the table

            const rebuilt = {
              ...(swAnyVals.length ? { swAny: swAnyVals } : {}),

              ...(domVariants.length ? { variants: domVariants } : {}),

      async function getSwCaches() {

          _swCaches = {

      function attachSwCombobox(inp, field) {
        const wrap = inp.closest(".sw-combo-wrap");
        if (!wrap || wrap.dataset.swInit) return;
        wrap.dataset.swInit = field;
        const ddEl = wrap.querySelector(".sw-combo-dd");
        if (!ddEl) return;

        let _active = -1;
        const its = () => ddEl.querySelectorAll("li");

        async function openDd(query) {
          const caches = await getSwCaches();
          const vals = caches[field];
          const q = query.trim().toLowerCase();
          const matches = vals.filter(v => v.toLowerCase().includes(q));
          if (!matches.length) { closeDd(); return; }
          ddEl.innerHTML = matches.map(v => `<li data-val="${escapeHtml(v)}">${escapeHtml(v)}</li>`).join("");
          ddEl.querySelectorAll("li").forEach(li =>
            li.addEventListener("mousedown", e => { e.preventDefault(); selectVal(li.dataset.val); })
          );
          _active = -1;
          ddEl.hidden = false;
        }

        function closeDd() { ddEl.hidden = true; _active = -1; }

        function highlight(idx) {
          const list = its();
          list.forEach(li => li.classList.remove("sw-active"));
          if (idx >= 0 && idx < list.length) { list[idx].classList.add("sw-active"); list[idx].scrollIntoView({ block: "nearest" }); }
          _active = idx;
        }

        function selectVal(val) {
          inp.value = val;
          closeDd();
          inp.dispatchEvent(new Event("input", { bubbles: true }));
          inp.focus();
        }

        inp.addEventListener("focus", () => openDd(inp.value || ""));
        inp.addEventListener("input", () => openDd(inp.value));
        inp.addEventListener("keydown", e => {
          const list = its();
          if (e.key === "ArrowDown") { e.preventDefault(); highlight(Math.min(_active + 1, list.length - 1)); }
          else if (e.key === "ArrowUp") { e.preventDefault(); highlight(Math.max(_active - 1, 0)); }
          else if (e.key === "Enter" && !ddEl.hidden) {
            e.preventDefault();
            if (_active >= 0 && list[_active]) selectVal(list[_active].dataset.val);
            else if (list.length === 1) selectVal(list[0].dataset.val);
          } else if (e.key === "Escape") closeDd();
        });
        inp.addEventListener("blur", () => setTimeout(() => closeDd(), 150));
      }

        if (orderedSimulationToggle) {
          orderedSimulationToggle.addEventListener("change", () => {
            // Auto-fill day_type with "simulation" when toggling on, if currently empty.
            if (orderedSimulationToggle.checked) {
              const dayTypeInput = document.getElementById("day-type-input");
              if (dayTypeInput && !dayTypeInput.value.trim()) {
                dayTypeInput.value = "simulation";
              }
            }
            onStructuredChanged();
            state.expandedSimulationSlots = new Set();
            renderEditor();
          });
        }

        document.querySelectorAll("input, select").forEach((el) => {
          if (el.id === "token-input") return;
          if (el.id === "active-toggle") return;
          if (el.id === "day-ordered-simulation-input") return;
          if (el.id === "raw-json") return;
          el.addEventListener("change", onStructuredChanged);
          el.addEventListener("input", onStructuredChanged);
        });

        const addDayBtn = document.getElementById("add-day-btn");
        if (addDayBtn) {
          addDayBtn.addEventListener("click", () => {
            onStructuredChanged();
            state.jsonObj.builder.day_templates.push({
              day_key: `day${state.jsonObj.builder.day_templates.length + 1}`,
              focus: "",
              is_ordered_simulation: false,
              ordered_slots: [],
            });
            state.dayTab = state.jsonObj.builder.day_templates.length - 1;
            renderEditor();
          });
        }

        const addSlotBtn = document.getElementById("add-slot-btn");
        if (addSlotBtn) {
          addSlotBtn.addEventListener("click", () => {
            onStructuredChanged();
            const template = state.jsonObj.builder.day_templates[state.dayTab];
            if (!template) return;
            template.ordered_slots.push({
              slot: "",
              slot_family: "",
              variability_policy: "",
              sw2: "",
              sw: "",
              mp: "",
              requirePref: "",
              preferLoadable: false,
              requireHyroxRole: "",
              station_index: "",
              required_equipment_slugs: [],
              station_fallback_chain: [],
              fill_fallback_slot: "",
            });
            renderEditor();
          });
        }

        document.querySelectorAll("#slots-tbody tr[data-slot-index]").forEach((row) => {
          row.querySelectorAll("button[data-slot-act]").forEach((btn) => {
            btn.addEventListener("click", () => {
              onStructuredChanged();
              const index = Number(row.dataset.slotIndex);
              const template = state.jsonObj.builder.day_templates[state.dayTab];
              if (!template) return;
              const act = btn.dataset.slotAct;
              if (act === "up") moveSlot(index, -1);
              if (act === "down") moveSlot(index, 1);
              if (act === "remove") {
                template.ordered_slots.splice(index, 1);
                state.expandedVariantSlots = new Set();
                state.expandedSimulationSlots = new Set();
                renderEditor();
              }
            });
          });
        });

        const addBlockBtn = document.getElementById("add-block-btn");
        if (addBlockBtn) {
          addBlockBtn.addEventListener("click", () => {
            onStructuredChanged();
            const nextLetter =
              prompt("Enter block letter (e.g. E):", "E")?.trim().toUpperCase() || "";
            if (!nextLetter) return;
            if (!state.jsonObj.segmentation.block_semantics[nextLetter]) {
              state.jsonObj.segmentation.block_semantics[nextLetter] = {
                preferred_segment_type: "single",
                purpose: "accessory",
              };
            }
            renderEditor();
          });
        }

        const rawJsonEl = document.getElementById("raw-json");
        if (rawJsonEl) {
          rawJsonEl.addEventListener("input", () => {
            state.rawEdited = true;
            state.isDirty = true;
            updateSaveBtnState(true);
            state.rawText = rawJsonEl.value;
          });
        }

        const formatBtn = document.getElementById("format-json-btn");
        if (formatBtn) {
          formatBtn.addEventListener("click", () => {
            const raw = document.getElementById("raw-json");
            try {
              const parsed = JSON.parse(raw.value || "{}");
              raw.value = JSON.stringify(parsed, null, 2);
              state.rawText = raw.value;
              state.rawEdited = true;
              state.isDirty = true;
              updateSaveBtnState(true);
              setStatus("JSON formatted", "ok");
            } catch {
              setStatus("Invalid JSON in raw editor", "err");
            }
          });
        }

        const saveBtn = document.getElementById("save-btn");
        if (saveBtn) {
          saveBtn.addEventListener("click", onSave);
        }

        const saveBtnTop = document.getElementById("save-btn-top");
        if (saveBtnTop) {
          saveBtnTop.addEventListener("click", onSave);
        }

        const discardBtn = document.getElementById("discard-btn");
        if (discardBtn) {
          discardBtn.addEventListener("click", async () => {
            if (!state.selectedKey) return;
            await loadConfig(state.selectedKey);
            setStatus("Discarded unsaved changes", "ok");
          });
        }

        initSwComboboxes();
        initMpComboboxes();
        initSwAnyChips();

        // Variant toggle expand/collapse
        document.querySelectorAll("[data-variant-toggle]").forEach(btn => {
          btn.addEventListener("click", () => {
            const idx = Number(btn.dataset.variantToggle);
            const expandRow = document.querySelector(`[data-variant-for="${idx}"]`);
            if (!expandRow) return;
            const nowHidden = expandRow.hidden;
            if (nowHidden) {
              state.expandedVariantSlots.add(idx);
              expandRow.hidden = false;
            } else {
              state.expandedVariantSlots.delete(idx);
              expandRow.hidden = true;
            }
            updateVariantToggleBtn(idx);
          });
        });
        document.querySelectorAll("[data-simulation-toggle]").forEach(btn => {
          btn.addEventListener("click", () => {
            const idx = Number(btn.dataset.simulationToggle);
            const expandRow = document.querySelector(`[data-simulation-for="${idx}"]`);
            if (!expandRow) return;
            const nowHidden = expandRow.hidden;
            if (nowHidden) {
              state.expandedSimulationSlots.add(idx);
              expandRow.hidden = false;
            } else {
              state.expandedSimulationSlots.delete(idx);
              expandRow.hidden = true;
            }
            updateSimulationToggleBtn(idx);
          });
        });

        // Add variant row
        document.querySelectorAll(".add-variant-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const slotIdx = Number(btn.dataset.addVariantFor);
            const tbody = document.querySelector(`[data-variant-tbody="${slotIdx}"]`);
            if (!tbody) return;
            const newIdx = tbody.querySelectorAll("tr[data-variant-index]").length;
            const tr = document.createElement("tr");
            tr.dataset.variantIndex = String(newIdx);
            tr.innerHTML = renderVariantRowHtml({});
            tbody.appendChild(tr);
            tr.querySelectorAll("input, select").forEach(el => {
              el.addEventListener("change", onStructuredChanged);
              el.addEventListener("input", onStructuredChanged);
            });
            initSwComboboxes();
            initMpComboboxes();
            initSwAnyChips();
            updateVariantToggleBtn(slotIdx);
            onStructuredChanged();
          });
        });

        // Remove variant row (delegated)
        document.querySelectorAll("[data-variant-tbody]").forEach(tbody => {
          tbody.addEventListener("click", e => {
            const btn = e.target.closest("[data-variant-act='remove']");
            if (!btn) return;
            const row = btn.closest("tr[data-variant-index]");
            if (!row) return;
            const slotIdx = Number(tbody.dataset.variantTbody);
            row.remove();
            tbody.querySelectorAll("tr[data-variant-index]").forEach((r, i) => { r.dataset.variantIndex = String(i); });
            updateVariantToggleBtn(slotIdx);
            onStructuredChanged();
          });
        });
        document.querySelectorAll(".add-fallback-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            const slotIdx = Number(btn.dataset.addFallbackFor);
            const tbody = document.querySelector(`[data-fallback-tbody="${slotIdx}"]`);
            if (!tbody) return;
            const newIdx = tbody.querySelectorAll("tr[data-fallback-index]").length;
            const tr = document.createElement("tr");
            tr.dataset.fallbackIndex = String(newIdx);
            tr.innerHTML = renderFallbackRowHtml({});
            tbody.appendChild(tr);
            tr.querySelectorAll("input, select").forEach((el) => {
              el.addEventListener("change", onStructuredChanged);
              el.addEventListener("input", onStructuredChanged);
            });
            initSwComboboxes();
            initMpComboboxes();
            initSwAnyChips();
            updateSimulationToggleBtn(slotIdx);
            onStructuredChanged();
          });
        });
        document.querySelectorAll("[data-fallback-tbody]").forEach((tbody) => {
          tbody.addEventListener("click", (e) => {
            const btn = e.target.closest("[data-fallback-act='remove']");
            if (!btn) return;
            const row = btn.closest("tr[data-fallback-index]");
            if (!row) return;
            const slotIdx = Number(tbody.dataset.fallbackTbody);
            row.remove();
            tbody.querySelectorAll("tr[data-fallback-index]").forEach((r, i) => { r.dataset.fallbackIndex = String(i); });
            updateSimulationToggleBtn(slotIdx);
            onStructuredChanged();
          });
        });
        document.querySelectorAll("[data-sim-field]").forEach((el) => {
          el.addEventListener("input", () => {
            const row = el.closest("[data-simulation-for]");
            if (!row) return;
            updateSimulationToggleBtn(Number(row.dataset.simulationFor));
          });
          el.addEventListener("change", () => {
            const row = el.closest("[data-simulation-for]");
            if (!row) return;
            updateSimulationToggleBtn(Number(row.dataset.simulationFor));
          });
        });
      }

      function updateSaveBtnState(isDirty) {
        for (const id of ["save-btn", "save-btn-top"]) {
          const btn = document.getElementById(id);
          if (!btn) continue;
          btn.classList.toggle("primary", isDirty);
          btn.classList.toggle("saved", !isDirty);
          btn.textContent = isDirty ? "Save Changes" : "Saved";
          btn.disabled = !isDirty;
        }
      }

      async function onSave() {
        try {
          if (!validateStructuredEditor()) return;
          let baseJson = {};
          const rawEl = document.getElementById("raw-json");
          if (state.rawEdited) {
            baseJson = JSON.parse(rawEl?.value || "{}");
          } else {
            baseJson = deepClone(state.jsonObj);
          }
          state.jsonObj = baseJson;
          ensureBuilderAndSegmentation();
          updateFromStructuredInputs();
          syncRaw();

          const progressionByRank = updateRankJsonFromInputs();

          const payload = {
            program_generation_config_json: state.jsonObj,
            progression_by_rank_json: progressionByRank,
            is_active: !!state.configRow.is_active,
          };

          const data = await apiFetch(`/admin/configs/${encodeURIComponent(state.selectedKey)}`, {
            method: "PUT",
            body: JSON.stringify(payload),
          });

          state.rawEdited = false;
          state.isDirty = false;
          updateSaveBtnState(false);
          setStatus("Saved ✓", "ok");
          if (data?.config) {
            state.configRow = { ...state.configRow, ...data.config };
          }
          await loadConfigs(false);
          await loadConfig(state.selectedKey, { preserveDayTab: true });
        } catch (err) {
          setStatus(err.message || "Save failed", "err");
        }
      }

      async function loadConfigs(autoSelect = true) {
        try {
          const data = await apiFetch("/admin/configs");
          state.configs = data.configs || [];
          renderConfigList();
          if (autoSelect && !state.selectedKey && state.configs.length) {
            await loadConfig(state.configs[0].config_key);
          }
          setStatus(`Loaded ${state.configs.length} configs`, "ok");
        } catch (err) {
          setStatus(err.message || "Failed to load configs", "err");
        }
      }

      async function loadConfig(key, { preserveDayTab = false } = {}) {
        try {
          const data = await apiFetch(`/admin/configs/${encodeURIComponent(key)}`);
          state.selectedKey = key;
          state.configRow = data.config;
          state.jsonObj = deepClone(data.config?.program_generation_config_json || {});
          if (!preserveDayTab) state.dayTab = 0;
          state.expandedVariantSlots = new Set();
          state.expandedSimulationSlots = new Set();
          state.rawEdited = false;
          state.isDirty = false;
          ensureBuilderAndSegmentation();
          syncRaw();
          renderConfigList();
          renderEditor();
          setStatus(`Loaded ${key}`, "ok");
        } catch (err) {
          setStatus(err.message || "Failed to load config", "err");
        }
      }

      async function duplicateConfig() {
        try {
          const source_key = prompt("Source key to duplicate from:", state.selectedKey || "");
          if (!source_key) return;
          const new_key = prompt("New config key:", `${source_key}_copy`);
          if (!new_key) return;

          const data = await apiFetch("/admin/configs", {
            method: "POST",
            body: JSON.stringify({ source_key, new_key }),
          });

          setStatus(`Duplicated to ${data?.config?.config_key || new_key}`, "ok");
          await loadConfigs(false);
          await loadConfig(data?.config?.config_key || new_key);
        } catch (err) {
          setStatus(err.message || "Duplicate failed", "err");
        }
      }

      function init() {
        if (!ensureActiveAdminSession()) return;
        const savedToken = sessionStorage.getItem(STORAGE_KEY);
        if (savedToken) {
          tokenInput.value = savedToken;
          touchAdminSession();
        }
        installAdminIdleTimeout();

        loadBtn.addEventListener("click", () => loadConfigs(true));
        duplicateBtn.addEventListener("click", duplicateConfig);

        window.addEventListener("beforeunload", (e) => {
          if (state.isDirty) {
            e.preventDefault();
            e.returnValue = "";
          }
        });

        renderConfigList();
        renderEditor();
      }

      init();
    </script>
  </body>
</html>
