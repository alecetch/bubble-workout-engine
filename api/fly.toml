# fly.toml app configuration file generated for bubble-workout-api on 2026-03-07T10:12:04Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bubble-workout-api'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '10s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
