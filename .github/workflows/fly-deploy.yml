name: fly-deploy-api

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "migrations/**"
      - "scripts/migrate.sh"
      - ".github/workflows/fly-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Audit API dependencies
        working-directory: api
        run: npm audit --audit-level=high

      - name: Run tests
        working-directory: api
        run: npm test

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Start Fly MPG proxy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl mpg proxy "${{ vars.FLY_MPG_CLUSTER_ID }}" --local-port 15432 > /tmp/fly-mpg-proxy.log 2>&1 &
          for i in $(seq 1 15); do
            nc -z 127.0.0.1 15432 2>/dev/null && echo "Proxy ready after ${i}s" && break
            echo "Waiting for proxy... (${i}s)"
            sleep 1
          done
          nc -z 127.0.0.1 15432 2>/dev/null || { echo "ERROR: MPG proxy did not start within 15s"; cat /tmp/fly-mpg-proxy.log; exit 1; }

      - name: Run Flyway migrations and verify seeds
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          chmod +x scripts/migrate.sh
          PROXY_URL=$(node -e '
            const u = new URL(process.env.DATABASE_URL);
            u.hostname = "127.0.0.1";
            u.port = "15432";
            u.searchParams.set("sslmode", "disable");
            process.stdout.write(u.toString());
          ')
          DATABASE_URL="$PROXY_URL" ./scripts/migrate.sh
          DATABASE_URL="$PROXY_URL" npm --prefix api run qa:seeds

      - name: Deploy API to Fly
        working-directory: api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config fly.toml --remote-only
