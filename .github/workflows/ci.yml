name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: workout
          POSTGRES_PASSWORD: workout
          POSTGRES_DB: workout_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Run Flyway migrations
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}/migrations:/flyway/sql" \
            flyway/flyway:10 \
            -url="jdbc:postgresql://127.0.0.1:5432/workout_test" \
            -user=workout \
            -password=workout \
            -locations=filesystem:/flyway/sql \
            migrate

      - name: Run tests
        working-directory: api
        env:
          PGHOST: 127.0.0.1
          PGPORT: 5432
          PGUSER: workout
          PGPASSWORD: workout
          PGDATABASE: workout_test
          NODE_ENV: test
          INTERNAL_API_TOKEN: ci-test-token
          ENGINE_KEY: ci-test-key
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars-long
          JWT_ISSUER: workout-engine-ci
        run: npm test -- --test-concurrency=1

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Run mobile Tier 1 unit tests
        working-directory: mobile
        run: npm test
