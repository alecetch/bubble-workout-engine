name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: workout
          POSTGRES_PASSWORD: workout
          POSTGRES_DB: workout_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Run Flyway migrations
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}/migrations:/flyway/sql" \
            flyway/flyway:10 \
            -url="jdbc:postgresql://127.0.0.1:5432/workout_test" \
            -user=workout \
            -password=workout \
            -locations=filesystem:/flyway/sql \
            migrate

      - name: Validate compiledConfig for all active program types
        working-directory: api
        env:
          DATABASE_URL: postgres://workout:workout@127.0.0.1:5432/workout_test
          NODE_ENV: test
        run: node scripts/check_configs.mjs

      - name: Run API tests
        working-directory: api
        env:
          PGHOST: 127.0.0.1
          PGPORT: 5432
          PGUSER: workout
          PGPASSWORD: workout
          PGDATABASE: workout_test
          NODE_ENV: test
          INTERNAL_API_TOKEN: ci-test-token
          ENGINE_KEY: ci-test-key
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars-long
          JWT_ISSUER: workout-engine-ci
          REVENUECAT_WEBHOOK_SECRET: ci-test-webhook-secret
        run: npm test -- --test-concurrency=1

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: TypeScript check (mobile)
        working-directory: mobile
        run: npx tsc --noEmit

      - name: Run mobile Tier 1 unit tests
        working-directory: mobile
        run: npm test

      - name: Run mobile component tests (Vitest)
        working-directory: mobile
        run: npx vitest run --coverage

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: workout
          POSTGRES_PASSWORD: workout-ci
          POSTGRES_DB: workout_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: workout
      PGPASSWORD: workout-ci
      PGDATABASE: workout_test
      NODE_ENV: test
      JWT_SECRET: ci-test-jwt-secret-at-least-32-chars-long
      JWT_ISSUER: workout-engine-ci
      ENGINE_KEY: ci-test-engine-key-32chars-long
      INTERNAL_API_TOKEN: ci-test-internal-api-token
      REVENUECAT_WEBHOOK_SECRET: ci-test-webhook-secret
      MAESTRO_CLI_NO_ANALYTICS: "1"
      E2E_EMAIL: e2e@example.com
      E2E_PASSWORD: E2ePass123!

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            mobile/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run Flyway migrations
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}/migrations:/flyway/sql" \
            flyway/flyway:10 \
            -url="jdbc:postgresql://127.0.0.1:5432/workout_test" \
            -user=workout \
            -password=workout-ci \
            -locations=filesystem:/flyway/sql \
            migrate

      - name: Start API
        run: |
          node api/server.js &
          npx --yes wait-on http://127.0.0.1:3000/health --timeout 30000

      - name: Provision E2E test account
        run: bash scripts/provision-e2e-db.sh
        env:
          API_URL: http://127.0.0.1:3000

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Install Maestro 2.5.1
        run: |
          export MAESTRO_VERSION=2.5.1
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run E2E flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6
          avd-name: e2e-pixel6-api34
          emulator-options: -no-snapshot -no-window -no-audio -no-boot-anim
          disable-animations: true
          script: |
            adb reverse tcp:3000 tcp:3000
            cd mobile && EXPO_PUBLIC_API_BASE_URL=http://10.0.2.2:3000 EXPO_PUBLIC_ENGINE_KEY="$ENGINE_KEY" npx expo start --dev-client --port 8081 > /tmp/metro.log 2>&1 &
            npx --yes wait-on http://127.0.0.1:8081 --timeout 120000
            adb shell settings put global package_verifier_enable 0
            adb shell settings put global verifier_verify_adb_installs 0
            adb install -r mobile/android/app/build/outputs/apk/debug/app-debug.apk
            maestro test mobile/.maestro/01-auth-login.yaml -e TEST_EMAIL="$E2E_EMAIL" -e TEST_PASSWORD="$E2E_PASSWORD" --no-ansi
            maestro test mobile/.maestro/02-start-workout.yaml -e TEST_EMAIL="$E2E_EMAIL" -e TEST_PASSWORD="$E2E_PASSWORD" --no-ansi

      - name: Upload Maestro debug output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug
          path: ~/.maestro/tests/
          if-no-files-found: ignore

      - name: Upload Metro log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: metro-log
          path: /tmp/metro.log
          if-no-files-found: ignore
