appId: com.bubbleworkout.mobile
---
# Precondition: test account must be logged in with an active "Strength Block" program.
# Run 01-auth-login.yaml first, or log in manually.
- launchApp:
    stopApp: false
- runScript:
    file: scripts/post-launch-sleep.js
- launchApp:
    stopApp: false
- runFlow:
    when:
      visible: "Development Build"
    commands:
      - extendedWaitUntil:
          visible: "http://10.0.2.2:8081"
          timeout: 30000
      - tapOn: "http://10.0.2.2:8081"
      - extendedWaitUntil:
          visible: "Continue"
          timeout: 120000
      - tapOn: "Continue"
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible: "Programs"
    timeout: 30000
- tapOn: "Programs"
- extendedWaitUntil:
    visible: "Active Programs"
    timeout: 30000
- tapOn: "Strength Block"
- extendedWaitUntil:
    visible: "Day Preview"
    timeout: 45000
- tapOn: "Start workout"
- extendedWaitUntil:
    visible: "Workout complete"
    timeout: 45000
- assertVisible: "Change equipment"
